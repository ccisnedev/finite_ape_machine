name: CI

on:
  push:
    branches: [main]
    paths:
      - 'code/cli/**'
      - 'code/site/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'code/cli/**'
      - 'code/site/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: code/cli
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze
      - run: dart test
