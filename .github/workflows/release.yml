# Release workflow — 3-job pattern: check-version → create-release → build (matrix)
#
# WORKAROUND (Windows only): Windows Defender on the windows-2025 / windows-latest
# runner image (20260413.84.1+) quarantines dart.exe from the toolcache after
# `dart test` runs. Symptom: `dart pub get`, `dart analyze`, `dart test`
# succeed, but `dart compile exe` fails with "dart not recognized" even
# though $env:DART_HOME still points at a now-empty directory.
#
# Mitigation: before compiling, wipe the dart toolcache dir and the
# temp zip, then re-run dart-lang/setup-dart. This is applied conditionally
# via `if: runner.os == 'Windows'` in the build job.
#
# If this workaround is removed, the Windows release build will fail in ways
# that look (but are not) like PATH issues.

name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'code/cli/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  # ─── Job 1: Check version ──────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: read
        run: |
          VERSION=$(grep -E '^version:' code/cli/pubspec.yaml | sed -E 's/^version:\s*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version in pubspec: $VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v${{ steps.read.outputs.version }}"
          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on remote. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG not found. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ─── Job 2: Create release (published, not draft) ─────────────────
  create-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest

  # ─── Job 3: Build + upload (matrix: Windows + Linux) ───────────────
  build:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset: ape-windows-x64.zip
            binary: ape.exe
          - os: ubuntu-latest
            asset: ape-linux-x64.tar.gz
            binary: ape
    defaults:
      run:
        working-directory: code/cli
    steps:
      - uses: actions/checkout@v4

      # ── Windows Defender workaround (Windows only) ──
      - name: Exclude toolcache from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "C:\hostedtoolcache" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "D:\a" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "dart.exe" -ErrorAction SilentlyContinue
          $dartCache = "C:\hostedtoolcache\windows\dart"
          if (Test-Path $dartCache) {
            Remove-Item -Recurse -Force $dartCache
          }

      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
      - run: dart analyze
      - run: dart test

      # ── Windows Defender workaround before compile (Windows only) ──
      - name: Clean dart cache to force re-download
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dartCache = "C:\hostedtoolcache\windows\dart"
          if (Test-Path $dartCache) {
            Write-Host "Removing $dartCache"
            Remove-Item -Recurse -Force $dartCache
          }
          $dartZip = "D:\a\_temp\dartsdk-windows-x64-release.zip"
          if (Test-Path $dartZip) {
            Write-Host "Removing $dartZip"
            Remove-Item -Force $dartZip
          }

      - name: Re-setup Dart (ensure SDK present before compile)
        if: runner.os == 'Windows'
        uses: dart-lang/setup-dart@v1

      # ── Compile ──
      - name: Create build directories (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path build\bin | Out-Null

      - name: Create build directories (Linux)
        if: runner.os == 'Linux'
        run: mkdir -p build/bin

      - name: Compile
        run: dart compile exe bin/main.dart -o build/bin/${{ matrix.binary }}

      - name: Copy assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Recurse assets build\assets

      - name: Copy assets (Linux)
        if: runner.os == 'Linux'
        run: cp -r assets build/assets

      # ── Package (platform-specific) ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build\* -DestinationPath ${{ matrix.asset }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar czf ${{ matrix.asset }} -C build .

      # ── Upload ──
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.check-version.outputs.version }}" ${{ matrix.asset }} --clobber
        shell: bash
