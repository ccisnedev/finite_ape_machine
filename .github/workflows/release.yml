name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'code/cli/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: code/cli

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.8.1'

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Read version from pubspec.yaml
        id: version
        run: |
          $v = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value.Trim()
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"
        shell: pwsh

      - name: Build
        run: |
          New-Item -ItemType Directory -Force -Path build\bin | Out-Null
          & "$env:DART_HOME\bin\dart.exe" compile exe bin/main.dart -o build\bin\ape.exe
          Copy-Item -Recurse assets build\assets
        shell: pwsh

      - name: Package
        run: Compress-Archive -Path build\* -DestinationPath ape-windows-x64.zip
        shell: pwsh

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: code/cli/ape-windows-x64.zip
          generate_release_notes: true
          make_latest: true
