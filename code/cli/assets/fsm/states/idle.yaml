name: idle
version: "1.0.0"
description: "Triage and issue formulation"

instructions: |
  IDLE has two internal modes: TRIAGE and DONE.
  TRIAGE is the default: DEWEY clarifies scope, searches, and creates or selects an issue.
  When issue readiness is reached, produce issue_selected_or_created, reset DEWEY, and remain in IDLE.
  DONE is reached only on explicit start intent; DONE consumes issue-start to prepare feature_branch_selected.
  Only after that handoff may IDLE fire start_analyze.
  Run 'iq doctor' as first action to validate environment.

constraints:
  - Read-only mode — no code edits
  - No file creation outside of GitHub issues
  - No branch preparation (belongs to transition prechecks)
  - No analysis of root causes (belongs to ANALYZE)
  - No solution proposals (belongs to PLAN)

allowed_actions:
  - Create GitHub issues
  - Edit GitHub issues
  - Comment on GitHub issues
  - Search codebase (read-only)
  - Discuss and clarify with user
  - Run iq doctor
