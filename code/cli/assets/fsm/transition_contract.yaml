metadata:
  version: "1.0.0"
  description: "APE FSM transition contract"

states:
  - IDLE
  - ANALYZE
  - PLAN
  - EXECUTE
  - END
  - EVOLUTION

completion_authority:
  IDLE: user
  ANALYZE: user
  PLAN: user
  EXECUTE: user
  END: automatic
  EVOLUTION: automatic

events:
  - start_analyze
  - complete_analysis
  - approve_plan
  - finish_execute
  - pr_ready
  - pr_ready_no_evolution
  - finish_evolution
  - block
  - go_execute

transitions:
  - from: IDLE
    event: start_analyze
    to: ANALYZE
    allowed: true
    operations:
      prechecks: [issue_selected_or_created, feature_branch_selected]
      effects: [open_analysis_context, reset_mutations, snapshot_metrics]
      artifacts: [analysis/index.md, .inquiry/metrics_snapshot.yaml]
      commit_policy: none
      prompt_fragment_id: idle_to_analyze

  - from: IDLE
    event: complete_analysis
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot complete analysis before ANALYZE"

  - from: IDLE
    event: approve_plan
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot approve plan directly"

  - from: IDLE
    event: finish_execute
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot finish execute"

  - from: IDLE
    event: pr_ready
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot create PR or enter evolution"

  - from: IDLE
    event: pr_ready_no_evolution
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot create PR or skip evolution"

  - from: IDLE
    event: finish_evolution
    to: ILLEGAL
    allowed: false
    reason: "IDLE cannot finish evolution"

  - from: IDLE
    event: block
    to: IDLE
    allowed: true
    operations:
      prechecks: []
      effects: [noop]
      artifacts: []
      commit_policy: none
      prompt_fragment_id: idle_block

  - from: IDLE
    event: go_execute
    to: ILLEGAL
    allowed: false
    reason: "IDLE -> EXECUTE is forbidden"

  - from: ANALYZE
    event: start_analyze
    to: ANALYZE
    allowed: true
    operations:
      prechecks: []
      effects: [continue_analysis]
      artifacts: [analyze/notes.md]
      commit_policy: none
      prompt_fragment_id: analyze_continue

  - from: ANALYZE
    event: complete_analysis
    to: PLAN
    allowed: true
    operations:
      prechecks: [issue_selected_or_created, diagnosis_exists]
      effects: [generate_plan]
      artifacts: [plan.md]
      commit_policy: stage_only
      prompt_fragment_id: analyze_to_plan

  - from: ANALYZE
    event: approve_plan
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE cannot jump to EXECUTE"

  - from: ANALYZE
    event: finish_execute
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE cannot finish execute"

  - from: ANALYZE
    event: pr_ready
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE cannot create PR or enter evolution"

  - from: ANALYZE
    event: pr_ready_no_evolution
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE cannot create PR or skip evolution"

  - from: ANALYZE
    event: finish_evolution
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE cannot finish evolution"

  - from: ANALYZE
    event: block
    to: IDLE
    allowed: true
    operations:
      prechecks: []
      effects: [pause_analysis]
      artifacts: []
      commit_policy: none
      prompt_fragment_id: analyze_to_idle

  - from: ANALYZE
    event: go_execute
    to: ILLEGAL
    allowed: false
    reason: "ANALYZE -> EXECUTE is forbidden without PLAN"

  - from: PLAN
    event: start_analyze
    to: ANALYZE
    allowed: true
    operations:
      prechecks: []
      effects: [reopen_analysis]
      artifacts: []
      commit_policy: none
      prompt_fragment_id: plan_to_analyze

  - from: PLAN
    event: complete_analysis
    to: ILLEGAL
    allowed: false
    reason: "PLAN cannot complete analysis"

  - from: PLAN
    event: approve_plan
    to: EXECUTE
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected, plan_approved]
      effects: [prepare_execute]
      artifacts: [execution_log.md]
      commit_policy: branch_required
      prompt_fragment_id: plan_to_execute

  - from: PLAN
    event: finish_execute
    to: ILLEGAL
    allowed: false
    reason: "PLAN cannot finish execute"

  - from: PLAN
    event: pr_ready
    to: ILLEGAL
    allowed: false
    reason: "PLAN cannot create PR or enter evolution"

  - from: PLAN
    event: pr_ready_no_evolution
    to: ILLEGAL
    allowed: false
    reason: "PLAN cannot create PR or skip evolution"

  - from: PLAN
    event: finish_evolution
    to: ILLEGAL
    allowed: false
    reason: "PLAN cannot finish evolution"

  - from: PLAN
    event: block
    to: IDLE
    allowed: true
    operations:
      prechecks: []
      effects: [pause_plan]
      artifacts: []
      commit_policy: none
      prompt_fragment_id: plan_to_idle

  - from: PLAN
    event: go_execute
    to: EXECUTE
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected, plan_approved]
      effects: [prepare_execute]
      artifacts: [execution_log.md]
      commit_policy: branch_required
      prompt_fragment_id: plan_to_execute

  - from: EXECUTE
    event: start_analyze
    to: ANALYZE
    allowed: true
    operations:
      prechecks: []
      effects: [reopen_analysis]
      artifacts: []
      commit_policy: none
      prompt_fragment_id: execute_to_analyze

  - from: EXECUTE
    event: complete_analysis
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE cannot complete analysis"

  - from: EXECUTE
    event: approve_plan
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE cannot approve plan"

  - from: EXECUTE
    event: finish_execute
    to: END
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected]
      effects: [finalize_execution]
      artifacts: [execution_summary.md]
      commit_policy: stage_only
      prompt_fragment_id: execute_to_end

  - from: EXECUTE
    event: pr_ready
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE must go through END before PR creation"

  - from: EXECUTE
    event: pr_ready_no_evolution
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE must go through END before returning to IDLE"

  - from: EXECUTE
    event: finish_evolution
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE cannot finish evolution"

  - from: EXECUTE
    event: block
    to: ILLEGAL
    allowed: false
    reason: "EXECUTE cannot pause directly to IDLE; return to ANALYZE or finish execution"

  - from: EXECUTE
    event: go_execute
    to: EXECUTE
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected]
      effects: [continue_execute]
      artifacts: []
      commit_policy: branch_required
      prompt_fragment_id: execute_continue

  - from: END
    event: start_analyze
    to: ILLEGAL
    allowed: false
    reason: "END cannot start analyze"

  - from: END
    event: complete_analysis
    to: ILLEGAL
    allowed: false
    reason: "END cannot complete analysis"

  - from: END
    event: approve_plan
    to: ILLEGAL
    allowed: false
    reason: "END cannot approve plan"

  - from: END
    event: finish_execute
    to: ILLEGAL
    allowed: false
    reason: "END cannot finish execute again"

  - from: END
    event: pr_ready
    to: EVOLUTION
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected]
      effects: [push_branch, create_pull_request]
      artifacts: [pull_request.md]
      commit_policy: push_and_pr
      prompt_fragment_id: end_to_evolution

  - from: END
    event: pr_ready_no_evolution
    to: IDLE
    allowed: true
    operations:
      prechecks: [issue_selected, feature_branch_selected]
      effects: [push_branch, create_pull_request]
      artifacts: [pull_request.md]
      commit_policy: push_and_pr
      prompt_fragment_id: end_to_idle

  - from: END
    event: finish_evolution
    to: ILLEGAL
    allowed: false
    reason: "END cannot finish evolution"

  - from: END
    event: block
    to: ILLEGAL
    allowed: false
    reason: "END is an explicit PR gate and cannot be paused"

  - from: END
    event: go_execute
    to: ILLEGAL
    allowed: false
    reason: "END -> EXECUTE is forbidden"

  - from: EVOLUTION
    event: start_analyze
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot start analyze"

  - from: EVOLUTION
    event: complete_analysis
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot complete analysis"

  - from: EVOLUTION
    event: approve_plan
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot approve plan"

  - from: EVOLUTION
    event: finish_execute
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot finish execute"

  - from: EVOLUTION
    event: pr_ready
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot create PR or re-enter itself"

  - from: EVOLUTION
    event: pr_ready_no_evolution
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION cannot skip itself after it has started"

  - from: EVOLUTION
    event: finish_evolution
    to: IDLE
    allowed: true
    operations:
      prechecks: [retrospective_recorded]
      effects: [close_cycle, reset_mutations, collect_metrics]
      artifacts: [retrospective.md, .inquiry/metrics.yaml]
      commit_policy: none
      prompt_fragment_id: evolution_to_idle

  - from: EVOLUTION
    event: block
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION is automatic and one-shot — cannot be paused"

  - from: EVOLUTION
    event: go_execute
    to: ILLEGAL
    allowed: false
    reason: "EVOLUTION -> EXECUTE is forbidden"

preconditions:
  issue_selected_or_created:
    description: "Issue exists or has been created"
    kind: issue
  diagnosis_exists:
    description: "diagnosis.md exists for current issue"
    kind: filesystem
  issue_selected:
    description: "Issue selected in current context"
    kind: issue
  feature_branch_selected:
    description: "Current branch is issue-linked and not main"
    kind: git
  plan_approved:
    description: "User approved plan"
    kind: user-approval
  pr_created:
    description: "Pull request exists for issue branch"
    kind: github
  retrospective_recorded:
    description: "Retrospective document exists"
    kind: filesystem

prompt_fragments:
  idle_to_analyze:
    role: SOCRATES
    skill: memory-read
    template: "analyze.clarification"
  idle_block:
    role: APE
    skill: memory-read
    template: "idle.blocked"
  analyze_continue:
    role: SOCRATES
    skill: memory-read
    template: "analyze.iterate"
  analyze_to_plan:
    role: DESCARTES
    skill: memory-write
    template: "plan.from_diagnosis"
  analyze_to_idle:
    role: APE
    skill: memory-read
    template: "analyze.pause"
  plan_to_execute:
    role: BASHO
    skill: issue-start
    template: "execute.phase"
  plan_to_idle:
    role: APE
    skill: memory-read
    template: "plan.pause"
  execute_to_end:
    role: APE
    skill: issue-end
    template: "end.review"
  execute_continue:
    role: BASHO
    skill: issue-start
    template: "execute.continue"
  plan_to_analyze:
    role: SOCRATES
    skill: memory-read
    template: "analyze.reopen"
  execute_to_analyze:
    role: SOCRATES
    skill: memory-read
    template: "analyze.reopen"
  end_to_evolution:
    role: DARWIN
    skill: issue-end
    template: "evolution.from_end"
  end_to_idle:
    role: APE
    skill: issue-end
    template: "idle.resume"
  evolution_to_idle:
    role: APE
    skill: memory-read
    template: "idle.resume"
