<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fsm-title fsm-desc">
  <title id="fsm-title">APE finite state machine</title>
  <desc id="fsm-desc">The cycle starts from IDLE, advances through ANALYZE, PLAN, EXECUTE, and END, and returns to IDLE. Backward transitions are allowed: EXECUTE to ANALYZE shown above the main flow, PLAN to ANALYZE shown below it. After END, an opt-in EVOLUTION state can run before returning to IDLE.</desc>

  <style>
    .node-box { fill: #0a0e1a; stroke: #ef4444; stroke-width: 1.5; }
    .node-box.idle { stroke: #4a5678; }
    .node-box.opt { stroke: #e6a02d; stroke-dasharray: 4 3; fill: none; }

    .node-label {
      font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      fill: #ef4444;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .node-label.idle { fill: #6a7188; font-weight: 500; }
    .node-label.opt { fill: #e6a02d; }

    .edge { stroke: #a8b0c4; stroke-width: 1.3; fill: none; }
    .edge.back { stroke: #6a7188; stroke-width: 1; stroke-dasharray: 3 3; }
    .edge.opt { stroke: #e6a02d; stroke-width: 1.3; stroke-dasharray: 4 3; }

    .edge-label {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-style: italic;
      fill: #6a7188;
      text-anchor: middle;
    }
    .edge-label.opt { fill: #e6a02d; }

    .legend {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 10px;
      fill: #6a7188;
    }
  </style>

  <defs>
    <marker id="ah-fg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a8b0c4"/>
    </marker>
    <marker id="ah-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a7188"/>
    </marker>
    <marker id="ah-opt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e6a02d"/>
    </marker>
  </defs>

  <!-- Forward edges (y=88, box center) -->
  <line class="edge" x1="100" y1="88" x2="118" y2="88" marker-end="url(#ah-fg)"/>
  <line class="edge" x1="202" y1="88" x2="240" y2="88" marker-end="url(#ah-fg)"/>
  <line class="edge" x1="308" y1="88" x2="346" y2="88" marker-end="url(#ah-fg)"/>
  <line class="edge" x1="434" y1="88" x2="472" y2="88" marker-end="url(#ah-fg)"/>
  <line class="edge" x1="534" y1="88" x2="658" y2="88" marker-end="url(#ah-fg)"/>

  <!-- Main row of states at y=70..106 (h=36, center y=88) -->
  <rect class="node-box idle" x="30" y="70" width="70" height="36" rx="6"/>
  <text class="node-label idle" x="65" y="90">IDLE</text>

  <rect class="node-box" x="120" y="70" width="82" height="36" rx="6"/>
  <text class="node-label" x="161" y="90">ANALYZE</text>

  <rect class="node-box" x="242" y="70" width="66" height="36" rx="6"/>
  <text class="node-label" x="275" y="90">PLAN</text>

  <rect class="node-box" x="348" y="70" width="86" height="36" rx="6"/>
  <text class="node-label" x="391" y="90">EXECUTE</text>

  <rect class="node-box idle" x="474" y="70" width="60" height="36" rx="6"/>
  <text class="node-label idle" x="504" y="90">END</text>

  <rect class="node-box idle" x="660" y="70" width="70" height="36" rx="6"/>
  <text class="node-label idle" x="695" y="90">IDLE</text>

  <!-- EVOLUTION (below, opt-in) -->
  <rect class="node-box opt" x="440" y="220" width="128" height="36" rx="6"/>
  <text class="node-label opt" x="504" y="240">EVOLUTION</text>

  <!-- Backward: EXECUTE → ANALYZE, ABOVE the main row -->
  <path class="edge back" d="M 391 70 C 391 15, 161 15, 161 70" marker-end="url(#ah-muted)"/>
  <text class="edge-label" x="276" y="12">re-analyze (from EXECUTE)</text>

  <!-- Backward: PLAN → ANALYZE, BELOW the main row -->
  <path class="edge back" d="M 275 106 C 275 150, 161 150, 161 106" marker-end="url(#ah-muted)"/>
  <text class="edge-label" x="218" y="175">re-analyze (from PLAN)</text>

  <!-- Opt-in branch: END → EVOLUTION -->
  <path class="edge opt" d="M 504 106 L 504 220" marker-end="url(#ah-opt)"/>
  <text class="edge-label opt" x="548" y="163">opt-in</text>

  <!-- EVOLUTION → IDLE (right), closing the cycle -->
  <path class="edge opt" d="M 568 238 C 650 238, 695 238, 695 106" marker-end="url(#ah-opt)"/>

  <!-- Legend -->
  <g transform="translate(30, 290)">
    <line class="edge back" x1="0" y1="0" x2="26" y2="0" marker-end="url(#ah-muted)"/>
    <text class="legend" x="32" y="4">backward</text>
    <line class="edge opt" x1="110" y1="0" x2="136" y2="0" marker-end="url(#ah-opt)"/>
    <text class="legend" x="142" y="4">opt-in</text>
  </g>
</svg>
